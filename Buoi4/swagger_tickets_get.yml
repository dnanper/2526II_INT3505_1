summary: Lấy thông tin ticket theo id
parameters:
  - name: ticket_id
    in: path
    required: true
    type: integer
responses:
  200:
    description: Thông tin ticket
    schema:
      $ref: '#/definitions/Ticket'
  404:
    description: Ticket not found
    schema:
      type: object
      properties:
        error:
          type: string