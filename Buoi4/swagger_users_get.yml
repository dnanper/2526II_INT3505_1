summary: Lấy thông tin người dùng theo id
parameters:
  - name: user_id
    in: path
    required: true
    type: integer
responses:
  200:
    description: Thông tin user
    schema:
      $ref: '#/definitions/User'
  404:
    description: User not found
    schema:
      type: object
      properties:
        error:
          type: string